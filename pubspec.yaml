name: volkswagen
description: "Volkswagen Classic"
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  go_router: ^14.1.0
  path_provider: any
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2
  csv: ^6.0.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/data/
    - README.md
